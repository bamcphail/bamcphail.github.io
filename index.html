<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bryce McPhail</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #c8c4b0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px;
      font-family: 'EB Garamond', Georgia, serif;
    }

    .pad {
      width: 600px;
      background: #fdf9e3;
      box-shadow:
        0 2px 0 #e8c84a,
        0 4px 0 #fdf9e3,
        0 6px 0 #e8c84a,
        0 8px 0 #fdf9e3,
        0 10px 0 #e8c84a,
        4px 14px 24px rgba(0,0,0,0.25),
        2px 6px 8px rgba(0,0,0,0.15);
      border-top: 4px solid #e8c84a;
    }

    .page {
      padding: 36px 44px 48px 72px;
      background-image:
        linear-gradient(to right, transparent 46px, #e8a0a0 46px, #e8a0a0 47.5px, transparent 47.5px),
        repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 31px,
          #d4cfa0 31px,
          #d4cfa0 32px
        );
      background-color: #fdf9e3;
      line-height: 32px;
      min-height: 500px;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 32px;
      letter-spacing: -0.3px;
    }

    h1 a {
      color: #1a1a1a;
      text-decoration: none;
    }

    .tagline {
      font-size: 16px;
      color: #888;
      font-style: italic;
      line-height: 32px;
    }

    .spacer { height: 32px; }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    td {
      padding: 0;
      vertical-align: top;
      line-height: 32px;
      height: 32px;
    }

    td.date {
      color: #aaa;
      font-size: 15px;
      white-space: nowrap;
      padding-right: 24px;
      width: 90px;
      font-style: italic;
    }

    td.title a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 20px;
    }

    td.title a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="pad">
    <div class="page">
      <h1><a href="index.html">Bryce McPhail</a></h1>
      <div class="tagline">Essays</div>
      <div class="spacer"></div>
      <table>
        <tr>
          <td class="date">Mar 2026</td>
          <td class="title"><a href="thoughts-on-the-future-of-product-management.html">Thoughts on the Future of Product Management</a></td>
        </tr>
        <!-- Add new articles above this line -->
      </table>
    </div>
  </div>
</body>
</html>
