<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thoughts on the Future of Product Management — Bryce McPhail</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #c8c4b0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .pad {
      width: 600px;
      background: #fdf9e3;
      box-shadow:
        0 2px 0 #e8c84a,
        0 4px 0 #fdf9e3,
        0 6px 0 #e8c84a,
        0 8px 0 #fdf9e3,
        0 10px 0 #e8c84a,
        4px 14px 24px rgba(0,0,0,0.25),
        2px 6px 8px rgba(0,0,0,0.15);
      border-top: 4px solid #e8c84a;
    }

    .page {
      padding: 36px 44px 48px 72px;
      background-image:
        linear-gradient(to right, transparent 46px, #e8a0a0 46px, #e8a0a0 47.5px, transparent 47.5px),
        repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 31px,
          #d4cfa0 31px,
          #d4cfa0 32px
        );
      background-color: #fdf9e3;
      line-height: 32px;
      min-height: 500px;
    }

    .post-title {
      font-size: 28px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 32px;
    }

    .post-meta {
      font-size: 17px;
      color: #aaa;
      font-style: italic;
      line-height: 32px;
    }

    .post-meta a {
      color: #888;
      text-decoration: none;
    }

    .post-meta a:hover {
      text-decoration: underline;
    }

    .spacer { height: 32px; }

    .post-body p {
      font-size: 21px;
      color: #222;
      line-height: 32px;
      margin: 0 0 32px 0;
    }
  </style>
</head>
<body>
  <div class="pad">
    <div class="page">
      <div class="post-title">Thoughts on the Future of Product Management</div>
      <div class="post-meta">March 2026 &nbsp;|&nbsp; <a href="index.html">&larr; All blogs</a></div>
      <div class="spacer"></div>
      <div class="post-body">
      </div>
    </div>
  </div>
</body>
</html>
